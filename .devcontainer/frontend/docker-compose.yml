services:
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8000:3000"
    env_file:
      - ../../.env
    networks:
      - internal_network

  db:
    image: mariadb:12.2-noble
    restart: unless-stopped
    env_file: ../../.env
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p$$MARIADB_ROOT_PASSWORD"]
      interval: 10s
      retries: 5
    stdin_open: true 
    tty: true
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"           # Expose Vite dev server
    networks:
      - internal_network
    volumes:
      - ../../frontend:/workspace       # Bind host project folder for live edits
      - vue-npm-cache:/root/.npm  # Optional: cache npm packages across rebuilds
    tty: true                  # Keep the container interactive for terminal commands

  
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - ../../.env
    environment:
      - MINIO_ROOT_PASSWORD=$MINIO_ROOT_PASSWORD
      - MINIO_ROOT_USER=$MINIO_ROOT_USER
      - BUCKET_NAME=$BUCKET_NAME
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - internal_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://minio:9000/minio/health/live"]
      interval: 5s
      retries: 5
      start_period: 5s
      timeout: 3s
  
  minio_create_default_bucket:
    image: minio/mc
    env_file:
      - ../../.env
    environment:
      - MINIO_ROOT_PASSWORD=$MINIO_ROOT_PASSWORD
      - MINIO_ROOT_USER=$MINIO_ROOT_USER
      - BUCKET_NAME=$BUCKET_NAME
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - internal_network
    entrypoint: >
      sh -c "mc alias set minio http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD && \
             mc mb --ignore-existing minio/$BUCKET_NAME"

  reverse_proxy:
    build:
      context: ../../reverse_proxy
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - internal_network
    restart: unless-stopped

volumes:
  vue-npm-cache:
  minio_data:

networks:
  internal_network:
    driver: bridge
