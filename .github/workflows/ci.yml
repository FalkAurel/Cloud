name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      db:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: rootpassword
          MARIADB_USER: testuser
          MARIADB_PASSWORD: testpassword
          MARIADB_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies for aws-lc-sys
        run: sudo apt-get install -y cmake nasm

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Apply database schema
        run: |
          sudo apt-get install -y mariadb-client
          mysql -h 127.0.0.1 -u testuser -ptestpassword testdb < infra/init.sql

      - name: Run backend tests (including ignored integration tests)
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret
          MARIADB_USER: testuser
          MARIADB_PASSWORD: testpassword
          MARIADB_DATABASE: testdb
          # No SMTP relay in CI — email feature disabled
        run: cargo test --no-default-features -- --include-ignored

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/vue-project

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/vue-project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit -- --run
