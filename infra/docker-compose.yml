services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../.env
    depends_on:
      minio:
        condition: service_healthy
      minio_create_default_bucket:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - internal_network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    networks:
      - internal_network
    restart: unless-stopped

  db:
    image: mariadb:12.2-noble
    env_file: ../.env
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal_network
    restart: unless-stopped
    # MariaDB server system variables reference:
    # https://mariadb.com/kb/en/server-system-variables/
    command:
      - --innodb-buffer-pool-size=16M
      - --innodb-log-file-size=8M
      - --innodb-log-buffer-size=1M
      - --innodb-flush-log-at-trx-commit=2
      - --innodb-flush-method=O_DIRECT
      - --max-connections=20
      - --thread-cache-size=4
      - --query-cache-type=0
      - --tmp-table-size=8M
      - --max-heap-table-size=8M
      - --table-open-cache=64
      - --table-definition-cache=64
      - --key-buffer-size=8M
      - --performance-schema=OFF
      - --skip-name-resolve
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p$$MARIADB_ROOT_PASSWORD"]
      interval: 10s
      retries: 5
      timeout: 3s

  minio:
    image: minio/minio
    env_file: ../.env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - internal_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 5
      start_period: 5s
      timeout: 3s

  minio_create_default_bucket:
    image: minio/mc
    env_file: ../.env
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - internal_network
    entrypoint: >
      sh -c "mc alias set minio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
             mc mb --ignore-existing minio/$$BUCKET_NAME"

  reverse_proxy:
    build:
      context: ../reverse_proxy
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - internal_network
    restart: unless-stopped

volumes:
  db_data:
  minio_data:

networks:
  internal_network:
    driver: bridge
