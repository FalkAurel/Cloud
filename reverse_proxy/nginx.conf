# nginx.conf
events {
  worker_connections 1024;
}

http {
  server {
    listen 80;
    server_name docker.compose.local;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name docker.compose.local;

    ssl_certificate /etc/nginx/certs/docker.compose.local.pem;
    ssl_certificate_key /etc/nginx/certs/docker.compose.local.key;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api {
      proxy_buffering off;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;

      proxy_pass http://backend:5000/api;
    }

    location /* {
        proxy_pass http://minio:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /minio/ {
        proxy_pass http://minio:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_redirect off;

        # Optional: fix content links if needed
        # sub_filter_types text/html;
        sub_filter 'href="/"' 'href="/minio/"';
        sub_filter_once off;
    }

}
}